<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floverse</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9f5f0;
      font-family: 'Georgia', serif;
      color: #3a2e2e;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .logo {
      font-size: 3rem;
      font-weight: normal;
      letter-spacing: 0.15em;
      margin-bottom: 1.5rem;
      color: #7a5c5c;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: #c4a882;
      margin: 0 auto 1.5rem;
    }

    .tagline {
      font-size: 1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #9e8070;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="logo">Floverse</h1>
    <div class="divider"></div>
    <p class="tagline">Coming Soon</p>
  </div>
</body>
</html>
